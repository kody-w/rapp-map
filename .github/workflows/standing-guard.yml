name: Standing guard

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      report_owner_blocker:
        description: "Idempotently file or update the known owner-decision issue"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: standing-guard
  cancel-in-progress: false

jobs:
  checks:
    name: Guarded local structural checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20

      - name: Run credential-empty guarded local gates
        run: bash .github/scripts/run-offline-gates.sh

  report-owner-blocker:
    name: Optional owner-blocker report
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.report_owner_blocker == true }}
    needs: checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Use Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20

      - name: File or update decision-ready owner blocker
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RAPP1_REPORT_OWNER_BLOCKER: "true"
        run: node .github/scripts/standing-guard.mjs report
