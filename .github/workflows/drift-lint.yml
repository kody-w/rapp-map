name: Drift lint

on: [push, pull_request]

permissions: { contents: read }

jobs:
  drift-lint:
    name: Reviewed local gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20

      - name: Run credential-empty guarded local gates
        run: bash .github/scripts/run-offline-gates.sh
